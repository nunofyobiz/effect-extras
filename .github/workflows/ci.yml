name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  renovate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npx --yes --package renovate -- renovate-config-validator --strict

  typecheck:
    name: typecheck (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tc

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # Compatibility floor for the `effect` peer range (`^4.0.0-beta.74`). The latest
  # supported version is already exercised by the `typecheck`/`test` jobs above
  # (they install the pinned devDep, which Renovate keeps current); this job pins
  # the OTHER end — the oldest version the range promises — and re-runs the type
  # + runtime checks against it. Boundary testing: floor + latest, nothing in
  # between. `pnpm add` intentionally un-freezes the lockfile to swap the version.
  effect-compat:
    name: effect-compat (effect ${{ matrix.effect }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        effect: ["4.0.0-beta.74"] # peer-range floor; add entries only if we widen the floor
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D effect@${{ matrix.effect }} @effect/vitest@${{ matrix.effect }}
      - run: pnpm tc
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # Type-checks every `@example` block in the JSDoc and regenerates the API docs,
  # then fails if the committed `docs/` are stale — keeping the hosted GitHub Pages
  # site in sync with the source on every change.
  docgen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docgen
      - name: Verify generated docs are up to date
        run: git diff --exit-code docs/

  # `pnpm pack --dry-run` against the built package — validates the published file
  # list (`files` / tarball contents) that would otherwise only surface during a
  # real release. Uses `pack`, not `publish --dry-run`: the latter computes a
  # dist-tag against the live registry and errors once the package is published and
  # a branch sits at or below the released version. `pack` is registry-free.
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack --dry-run

  # Lints the published package's packaging config (`exports` map, `types`
  # conditions, ESM correctness) against the built `dist/` — the config that, if
  # broken, silently defeats consumer tree-shaking.
  publint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publint

  # Tree-shaking gate. Enforces the byte budgets in `.size-limit.json` (via
  # size-limit) — proves a subpath import tree-shakes to the function (one helper
  # stays ~tens of bytes, not the whole module) and that other modules shake away.
  # Fails if a change coarsens shaking or re-bundles the library into a blob.
  treeshake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm treeshake
